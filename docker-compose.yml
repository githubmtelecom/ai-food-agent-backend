version: '3.8'

services:
  # The Relational Database for Users and Orders
  postgres:
    image: postgres:15-alpine
    container_name: food-agent-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: food_agent_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # The In-Memory Cache and Message Broker
  redis:
    image: redis:7-alpine
    container_name: food-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: