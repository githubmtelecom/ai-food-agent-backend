services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: food-agent-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: food_agent_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: food-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api-gateway:
    build: ./services/api-gateway
    container_name: food-agent-api
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:secretpassword@postgres:5432/food_agent_db
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  celery-worker:
    build: ./services/api-gateway
    container_name: food-agent-worker
    command: celery -A worker worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://admin:secretpassword@postgres:5432/food_agent_db
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
